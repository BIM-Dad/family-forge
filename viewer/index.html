<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Symetri Family Forge Recipe Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181b1f;
      --panel-2: #20242a;
      --line: #303741;
      --text: #f3f5f7;
      --muted: #aab3bd;
      --accent: #74b8ff;
      --warn: #ffcc66;
      --bad: #ff7b7b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #0d0f12;
    }
    h1 { margin: 0; font-size: 18px; font-weight: 650; }
    button, .file-label {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font: inherit;
    }
    button:hover, .file-label:hover { border-color: var(--accent); }
    input[type="file"] { display: none; }
    main {
      display: grid;
      grid-template-columns: 320px minmax(420px, 1fr) 360px;
      min-height: calc(100vh - 61px);
    }
    aside, section {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }
    aside:last-child { border-right: 0; }
    .pane {
      padding: 14px;
      overflow: auto;
      max-height: calc(100vh - 61px);
    }
    .viewer {
      display: grid;
      grid-template-rows: minmax(360px, 1fr) 220px;
      position: relative;
      background: #0b0d10;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      background:
        linear-gradient(transparent 31px, rgba(255,255,255,0.035) 32px),
        linear-gradient(90deg, transparent 31px, rgba(255,255,255,0.035) 32px),
        #0b0d10;
      background-size: 32px 32px;
    }
    canvas:active { cursor: grabbing; }
    .view-hint {
      position: absolute;
      left: 12px;
      bottom: 232px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: rgba(13, 15, 18, .82);
      pointer-events: none;
      font-size: 12px;
    }
    .json-box {
      border-top: 1px solid var(--line);
      background: #0d0f12;
      padding: 12px;
      overflow: auto;
      white-space: pre;
      font: 12px Consolas, "Courier New", monospace;
      color: #d7dde5;
    }
    h2 {
      margin: 4px 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .summary, .list { display: grid; gap: 8px; margin-bottom: 18px; }
    .metric, .item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: var(--panel-2);
    }
    .metric { display: flex; justify-content: space-between; gap: 12px; }
    .metric span:last-child { color: var(--muted); text-align: right; }
    .item strong { display: block; margin-bottom: 4px; }
    .item small { color: var(--muted); line-height: 1.35; }
    .warn { border-color: rgba(255, 204, 102, .58); }
    .bad { border-color: rgba(255, 123, 123, .7); }
    .param { display: grid; gap: 6px; }
    .param-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .empty {
      color: var(--muted);
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 6px;
    }
    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      .pane { max-height: none; }
      aside, section { border-right: 0; border-bottom: 1px solid var(--line); }
      .viewer { min-height: 620px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Symetri Family Forge Recipe Viewer</h1>
    <div>
      <label class="file-label" for="recipeFile">Open Recipe JSON</label>
      <input id="recipeFile" type="file" accept=".json,application/json">
      <button id="resetView" type="button">Reset View</button>
      <button id="copyFeedback" type="button">Copy Feedback</button>
    </div>
  </header>
  <main>
    <aside class="pane">
      <h2>Recipe</h2>
      <div id="summary" class="summary"></div>
      <h2>Parameters</h2>
      <div id="parameters" class="list"></div>
      <h2>Elements</h2>
      <div id="elements" class="list"></div>
    </aside>
    <section class="viewer">
      <canvas id="preview" width="1200" height="760"></canvas>
      <div class="view-hint">Drag orbit | Shift+drag pan | Wheel zoom</div>
      <pre id="jsonBox" class="json-box">Open a Family Forge recipe to preview it before creating a Revit family.</pre>
    </section>
    <aside class="pane">
      <h2>Open Questions</h2>
      <div id="questions" class="list"></div>
      <h2>Builder Gaps</h2>
      <div id="gaps" class="list"></div>
      <h2>Preflight Feedback</h2>
      <div id="feedback" class="list"></div>
    </aside>
  </main>

  <script>
    const state = {
      recipe: null,
      params: new Map(),
      baselineParams: new Map(),
      colors: new Map(),
      camera: { yaw: -35, pitch: 24, zoom: 1, panX: 0, panY: 0 },
      pointer: null
    };
    const supportedTools = new Set(["extrusion", "voidExtrusion", "cylinder"]);
    const supportedTypes = new Set(["rectangularExtrusion", "voidRectangularExtrusion", "cylinder"]);
    const els = {
      file: document.getElementById("recipeFile"),
      resetView: document.getElementById("resetView"),
      copyFeedback: document.getElementById("copyFeedback"),
      canvas: document.getElementById("preview"),
      jsonBox: document.getElementById("jsonBox"),
      summary: document.getElementById("summary"),
      parameters: document.getElementById("parameters"),
      elements: document.getElementById("elements"),
      questions: document.getElementById("questions"),
      gaps: document.getElementById("gaps"),
      feedback: document.getElementById("feedback")
    };

    els.file.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      loadRecipe(JSON.parse(await file.text()));
    });
    els.resetView.addEventListener("click", () => {
      state.camera = { yaw: -35, pitch: 24, zoom: 1, panX: 0, panY: 0 };
      drawPreview(state.recipe);
    });
    els.copyFeedback.addEventListener("click", async () => {
      await navigator.clipboard.writeText(buildFeedbackText(state.recipe));
      els.copyFeedback.textContent = "Copied";
      setTimeout(() => els.copyFeedback.textContent = "Copy Feedback", 1200);
    });
    els.canvas.addEventListener("pointerdown", event => {
      els.canvas.setPointerCapture(event.pointerId);
      state.pointer = { x: event.clientX, y: event.clientY, mode: event.shiftKey ? "pan" : "orbit" };
    });
    els.canvas.addEventListener("pointermove", event => {
      if (!state.pointer) return;
      const dx = event.clientX - state.pointer.x;
      const dy = event.clientY - state.pointer.y;
      state.pointer.x = event.clientX;
      state.pointer.y = event.clientY;
      if (state.pointer.mode === "pan") {
        state.camera.panX += dx;
        state.camera.panY += dy;
      } else {
        state.camera.yaw += dx * 0.45;
        state.camera.pitch = clamp(state.camera.pitch - dy * 0.35, -70, 70);
      }
      drawPreview(state.recipe);
    });
    els.canvas.addEventListener("pointerup", () => { state.pointer = null; });
    els.canvas.addEventListener("wheel", event => {
      event.preventDefault();
      state.camera.zoom = clamp(state.camera.zoom * (event.deltaY > 0 ? 0.9 : 1.1), 0.2, 8);
      drawPreview(state.recipe);
    }, { passive: false });
    window.addEventListener("resize", () => drawPreview(state.recipe));

    function loadRecipe(recipe) {
      state.recipe = recipe;
      state.params = new Map(asArray(recipe.parameters).map(param => [param.name, coerceNumber(param.value, 0)]));
      state.baselineParams = new Map(state.params);
      state.colors = new Map(asArray(recipe.materials).map(material => [material.name, material.color || "#888888"]));
      els.jsonBox.textContent = JSON.stringify(recipe, null, 2);
      render();
    }

    function render() {
      if (!state.recipe) return;
      renderSummary();
      renderParameters();
      renderElements();
      renderQuestions();
      renderGaps();
      renderFeedback();
      drawPreview(state.recipe);
    }

    function renderSummary() {
      const recipe = state.recipe;
      els.summary.innerHTML = "";
      addMetric(els.summary, "Family", recipe.family?.name || "Unnamed");
      addMetric(els.summary, "Category", recipe.family?.category || "Unknown");
      addMetric(els.summary, "Units", recipe.family?.units || "Unknown");
      addMetric(els.summary, "Geometry", asArray(recipe.geometry).length);
      addMetric(els.summary, "Open Questions", asStringArray(recipe.clarifyingQuestions).length);
      addMetric(els.summary, "Builder Gaps", collectBuilderGaps(recipe).length);
    }

    function renderParameters() {
      const recipe = state.recipe;
      els.parameters.innerHTML = "";
      const params = asArray(recipe.parameters);
      if (!params.length) return empty(els.parameters, "No parameters found.");
      for (const param of params) {
        const value = state.params.get(param.name) ?? 0;
        const isLength = param.dataType === "length";
        const node = document.createElement("div");
        node.className = "item param";
        node.innerHTML = `
          <div class="param-row"><strong>${escapeHtml(param.name)}</strong><small class="value">${escapeHtml(formatNumber(value))} ${isLength ? recipe.family?.units || "" : ""}</small></div>
          <small>${escapeHtml(param.group || "")} | ${escapeHtml(param.source || "unknown")}</small>
          ${isLength ? `<input type="range" min="${Math.max(0, value * 0.35)}" max="${Math.max(value * 1.8, value + 1)}" step="1" value="${value}">` : ""}
        `;
        const slider = node.querySelector("input");
        if (slider) {
          slider.addEventListener("input", event => {
            const next = Number(event.target.value);
            state.params.set(param.name, next);
            node.querySelector(".value").textContent = `${formatNumber(next)} ${recipe.family?.units || ""}`;
            drawPreview(recipe);
          });
        }
        els.parameters.appendChild(node);
      }
    }

    function renderElements() {
      els.elements.innerHTML = "";
      const geometry = asArray(state.recipe.geometry);
      if (!geometry.length) return empty(els.elements, "No geometry found.");
      for (const item of geometry) {
        const ideal = item.idealRevitTool || inferIdealTool(item);
        const node = document.createElement("div");
        node.className = ideal && !supportedTools.has(ideal) ? "item warn" : "item";
        node.innerHTML = `<strong>${escapeHtml(item.name || item.id)}</strong><small>${escapeHtml(item.type)} | ${escapeHtml(item.subcategory || "No subcategory")}</small><br><small>Ideal: ${escapeHtml(ideal || "not stated")}</small>`;
        els.elements.appendChild(node);
      }
    }

    function renderQuestions() {
      els.questions.innerHTML = "";
      const questions = asStringArray(state.recipe.clarifyingQuestions);
      if (!questions.length) return empty(els.questions, "No open questions.");
      questions.forEach(question => addItem(els.questions, "Question", question, "warn"));
    }

    function renderGaps() {
      els.gaps.innerHTML = "";
      const gaps = collectBuilderGaps(state.recipe);
      if (!gaps.length) return empty(els.gaps, "No builder gaps detected.");
      gaps.forEach(gap => addItem(els.gaps, gap.title, gap.detail, "warn"));
    }

    function renderFeedback() {
      els.feedback.innerHTML = "";
      const feedback = buildFeedbackItems(state.recipe);
      if (!feedback.length) return empty(els.feedback, "No feedback items.");
      feedback.forEach(item => addItem(els.feedback, item.title, item.detail, item.kind));
    }

    function drawPreview(recipe) {
      if (!recipe) return;
      const canvas = els.canvas;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(800, Math.floor(rect.width * devicePixelRatio));
      canvas.height = Math.max(500, Math.floor(rect.height * devicePixelRatio));
      const ctx = canvas.getContext("2d");
      ctx.scale(devicePixelRatio, devicePixelRatio);
      ctx.clearRect(0, 0, rect.width, rect.height);
      const bounds = getBounds(recipe);
      const base = Math.min(rect.width / Math.max(bounds.width + bounds.depth, 1), rect.height / Math.max(bounds.height + bounds.depth, 1));
      const scale = base * 0.72 * state.camera.zoom;
      const origin = { x: rect.width * 0.5 + state.camera.panX, y: rect.height * 0.72 + state.camera.panY };
      drawAxes(ctx, origin, scale, bounds);
      collectFaces(recipe, origin, scale)
        .sort((a, b) => a.depth - b.depth)
        .forEach(face => drawFace(ctx, face));
    }

    function collectFaces(recipe, origin, scale) {
      const faces = [];
      const units = recipe.family?.units || "mm";
      for (const item of asArray(recipe.geometry)) {
        if (item.visible === false) continue;
        faces.push(...boxFaces(item, origin, scale, units));
      }
      return faces;
    }

    function boxFaces(item, origin, scale, units) {
      const p = resolvePoint(item.origin || {}, units);
      const d = item.dimensions || {};
      const width = resolveValue(d.width, units, "x");
      const depth = resolveValue(d.depth, units, "y");
      const height = resolveValue(d.height, units, "z");
      if (width <= 0 || depth <= 0 || height <= 0) return [];
      const world = [
        [p.x, p.y, p.z], [p.x + width, p.y, p.z], [p.x + width, p.y + depth, p.z], [p.x, p.y + depth, p.z],
        [p.x, p.y, p.z + height], [p.x + width, p.y, p.z + height], [p.x + width, p.y + depth, p.z + height], [p.x, p.y + depth, p.z + height]
      ].map(point => rotatePoint(centerX(point[0]), centerY(point[1]), point[2]));
      const screen = world.map(point => projectRotated(point, origin, scale));
      const indices = [[0,1,2,3], [4,5,6,7], [0,1,5,4], [1,2,6,5], [2,3,7,6], [3,0,4,7]];
      const color = state.colors.get(item.material) || "#777777";
      return indices.map(face => ({
        points: face.map(index => screen[index]),
        depth: face.reduce((sum, index) => sum + world[index].y, 0) / face.length,
        color
      }));
    }

    function drawAxes(ctx, origin, scale, bounds) {
      ctx.save();
      ctx.strokeStyle = "rgba(116,184,255,.55)";
      ctx.lineWidth = 1;
      line(ctx, project(-bounds.width / 2, 0, 0, origin, scale), project(bounds.width / 2, 0, 0, origin, scale));
      line(ctx, project(0, -bounds.depth / 2, 0, origin, scale), project(0, bounds.depth / 2, 0, origin, scale));
      line(ctx, project(0, 0, 0, origin, scale), project(0, 0, bounds.height, origin, scale));
      ctx.restore();
    }

    function drawFace(ctx, face) {
      ctx.save();
      ctx.strokeStyle = "rgba(0,0,0,.78)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(face.points[0].x, face.points[0].y);
      face.points.slice(1).forEach(point => ctx.lineTo(point.x, point.y));
      ctx.closePath();
      ctx.fillStyle = withAlpha(face.color, 0.72);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function rotatePoint(x, y, z) {
      const yaw = state.camera.yaw * Math.PI / 180;
      const pitch = state.camera.pitch * Math.PI / 180;
      const rx = x * Math.cos(yaw) - y * Math.sin(yaw);
      const ry = x * Math.sin(yaw) + y * Math.cos(yaw);
      return {
        x: rx,
        y: z * Math.sin(pitch) + ry * Math.cos(pitch),
        z: z * Math.cos(pitch) - ry * Math.sin(pitch)
      };
    }

    function project(x, y, z, origin, scale) {
      return projectRotated(rotatePoint(x, y, z), origin, scale);
    }

    function projectRotated(point, origin, scale) {
      return { x: origin.x + point.x * scale, y: origin.y - point.z * scale };
    }

    function line(ctx, a, b) {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    function getBounds(recipe) {
      const units = recipe.family?.units || "mm";
      const height = resolveParam("Height", 1000, units);
      const bodyStackHeight = resolveParam("Leg Height", 0, units) + resolveParam("Body Height", 0, units);
      return {
        width: resolveParam("Width", 1000, units),
        depth: resolveParam("Depth", 500, units),
        height: Math.max(height, bodyStackHeight)
      };
    }

    function resolvePoint(point, units) {
      return {
        x: resolveValue(point.x, units, "x"),
        y: resolveValue(point.y, units, "y"),
        z: resolveValue(point.z, units, "z")
      };
    }

    function resolveValue(value, units, axis) {
      if (typeof value === "number") return convertUnits(value * getAxisScale(axis), units);
      if (typeof value === "string") return resolveExpression(value, units);
      return 0;
    }

    function resolveParam(name, fallback, units) {
      return state.params.has(name) ? convertUnits(state.params.get(name), units) : fallback;
    }

    function resolveExpression(expression, units) {
      const trimmed = expression.trim();
      if (state.params.has(trimmed)) return resolveParam(trimmed, 0, units);
      const numeric = Number(trimmed);
      if (Number.isFinite(numeric)) return convertUnits(numeric, units);
      const replaced = trimmed.replace(/[A-Za-z][A-Za-z0-9_ ]*/g, token => {
        const key = token.trim();
        return state.params.has(key) ? String(resolveParam(key, 0, units)) : "0";
      });
      if (!/^[0-9+\-*/().\s]+$/.test(replaced)) return 0;
      try { return Number(Function(`"use strict"; return (${replaced});`)()) || 0; }
      catch { return 0; }
    }

    function centerX(value) { return value - getBounds(state.recipe).width / 2; }
    function centerY(value) { return value - getBounds(state.recipe).depth / 2; }
    function getAxisScale(axis) {
      if (axis === "x") return getParamRatio("Width");
      if (axis === "y") return getParamRatio("Depth");
      if (axis === "z") {
        const heightRatio = getParamRatio("Height");
        const bodyRatio = getParamRatio("Body Height");
        return Math.abs(heightRatio - 1) > 0.001 ? heightRatio : bodyRatio;
      }
      return 1;
    }
    function getParamRatio(name) {
      const baseline = state.baselineParams.get(name);
      const current = state.params.get(name);
      if (!Number.isFinite(baseline) || baseline === 0 || !Number.isFinite(current)) return 1;
      return current / baseline;
    }
    function convertUnits(value, units) { return units === "in" ? value * 25.4 : value; }
    function coerceNumber(value, fallback) { const next = Number(value); return Number.isFinite(next) ? next : fallback; }
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
    function formatNumber(value) { return Math.round(value * 100) / 100; }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value === undefined || value === null) return [];
      return [value];
    }

    function asStringArray(value) {
      return asArray(value).map(item => typeof item === "string" ? item : JSON.stringify(item));
    }

    function collectShapeWarnings(recipe) {
      const expectedArrays = [
        "parameters",
        "referencePlaneStrategy",
        "parameterStrategy",
        "nestedFamilies",
        "publishingQa",
        "referencePlanes",
        "materials",
        "geometry",
        "constraints",
        "assumptions",
        "clarifyingQuestions"
      ];
      const warnings = [];
      expectedArrays.forEach(key => {
        if (Object.prototype.hasOwnProperty.call(recipe, key) && !Array.isArray(recipe[key])) {
          warnings.push({
            title: `Fix JSON shape: ${key}`,
            detail: `${key} must be a JSON array. If there is only one item, wrap it in square brackets.`
          });
        }
      });
      if (recipe.qa?.warnings !== undefined && !Array.isArray(recipe.qa.warnings)) {
        warnings.push({
          title: "Fix JSON shape: qa.warnings",
          detail: "qa.warnings must be a JSON array. If there is only one warning, wrap it in square brackets."
        });
      }
      if (!asArray(recipe.geometry).length) {
        warnings.push({
          title: "No visible geometry",
          detail: "The recipe has no geometry array items for the viewer or Revit builder to draw."
        });
      }
      return warnings;
    }

    function collectBuilderGaps(recipe) {
      const gaps = [];
      for (const item of asArray(recipe.geometry)) {
        if (!supportedTypes.has(item.type)) gaps.push({ title: item.name || item.id, detail: `Unsupported buildable geometry type: ${item.type}` });
        const ideal = item.idealRevitTool || inferIdealTool(item);
        if (ideal && !supportedTools.has(ideal)) {
          gaps.push({ title: item.name || item.id, detail: `Ideal Revit tool is ${ideal}; current builder will use ${item.type}. ${item.approximationReason || ""}`.trim() });
        }
      }
      for (const nested of asArray(recipe.nestedFamilies)) {
        if (nested.status === "recommended" || nested.status === "required") {
          gaps.push({ title: nested.name, detail: `Nested family ${nested.status}: ${nested.purpose}` });
        }
      }
      return gaps;
    }

    function buildFeedbackItems(recipe) {
      if (!recipe) return [];
      const items = [];
      collectShapeWarnings(recipe).forEach(warning => items.push({ kind: "bad", title: warning.title, detail: warning.detail }));
      asStringArray(recipe.clarifyingQuestions).forEach(question => items.push({ kind: "warn", title: "Question to answer", detail: question }));
      asArray(recipe.parameters).forEach(param => {
        if (param.source === "inferred" || param.source === "defaulted") items.push({ kind: "warn", title: `Review ${param.name}`, detail: `Value is ${param.source}: ${param.value}` });
      });
      collectBuilderGaps(recipe).forEach(gap => items.push({ kind: "warn", title: `Builder gap: ${gap.title}`, detail: gap.detail }));
      return items;
    }

    function buildFeedbackText(recipe) {
      if (!recipe) return "";
      const lines = [`Symetri Family Forge recipe feedback for ${recipe.family?.name || "unnamed family"}`, "", "Questions to answer:"];
      const questions = asStringArray(recipe.clarifyingQuestions);
      lines.push(...(questions.length ? questions.map(item => `- ${item}`) : ["- None"]));
      lines.push("", "Suggested JSON/prompt revisions:");
      const feedback = buildFeedbackItems(recipe);
      lines.push(...(feedback.length ? feedback.map(item => `- ${item.title}: ${item.detail}`) : ["- None"]));
      return lines.join("\n");
    }

    function inferIdealTool(item) {
      const text = `${item.intent || ""} ${item.notes || ""}`.toLowerCase();
      if (text.includes("swept blend")) return "sweptBlend";
      if (text.includes("sweep")) return "sweep";
      if (text.includes("blend") || text.includes("taper")) return "blend";
      if (text.includes("nested")) return "nestedFamily";
      if (text.includes("reveal")) return "reveal";
      if (item.type === "cylinder") return "cylinder";
      if (item.type === "voidRectangularExtrusion") return "voidExtrusion";
      return "extrusion";
    }

    function addMetric(parent, label, value) {
      const node = document.createElement("div");
      node.className = "metric";
      node.innerHTML = `<span>${escapeHtml(label)}</span><span>${escapeHtml(String(value))}</span>`;
      parent.appendChild(node);
    }
    function addItem(parent, title, detail, kind) {
      const node = document.createElement("div");
      node.className = `item ${kind || ""}`;
      node.innerHTML = `<strong>${escapeHtml(title)}</strong><small>${escapeHtml(detail)}</small>`;
      parent.appendChild(node);
    }
    function empty(parent, message) {
      const node = document.createElement("div");
      node.className = "empty";
      node.textContent = message;
      parent.appendChild(node);
    }
    function withAlpha(hex, alpha) {
      const value = String(hex || "#777777").replace("#", "");
      const r = parseInt(value.substring(0, 2), 16) || 128;
      const g = parseInt(value.substring(2, 4), 16) || 128;
      const b = parseInt(value.substring(4, 6), 16) || 128;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
